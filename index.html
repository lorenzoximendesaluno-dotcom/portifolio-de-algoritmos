<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio de Algoritmos</title>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        /* Estilos gerais */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: #fafafa;
            color: #333;
        }

        /* Menu Lateral (Sidebar) */
        .sidebar {
            width: 260px;
            background-color: #ffffff;
            border-right: 1px solid #eaeaea;
            padding: 20px 0;
            overflow-y: auto;
            flex-shrink: 0;
        }
        .sidebar h2 {
            font-size: 1.2rem;
            color: #d9534f;
            padding: 0 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .sidebar li a {
            display: block;
            padding: 12px 20px;
            color: #555;
            text-decoration: none;
            font-size: 0.95rem;
            transition: background 0.2s, color 0.2s;
            border-left: 3px solid transparent;
        }
        .sidebar li a:hover {
            background-color: #fff3ed;
            color: #d9534f;
            border-left: 3px solid #d9534f;
        }

        /* Área Principal de Conteúdo */
        .main-content {
            flex-grow: 1;
            padding: 40px 60px;
            overflow-y: auto;
        }
        .header {
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #222;
        }
        .header p {
            color: #666;
            font-size: 1.1rem;
            max-width: 700px;
            line-height: 1.6;
        }

        /* Grid de Lições/Trabalhos */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .card {
            background-color: #ffffff;
            border: 1px solid #eaeaea;
            border-radius: 8px;
            padding: 25px;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }
        .card:not(.terminal-card):not(.folder-card):hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
            border-color: #d9534f;
        }
        .folder-card {
            border-color: #d9534f;
        }
        .card-number {
            font-size: 0.85rem;
            font-weight: bold;
            color: #d9534f;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .card h3 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            color: #333;
        }
        .card p {
            font-size: 0.95rem;
            color: #777;
            margin: 0;
            line-height: 1.5;
        }
        
        /* Ajuste específico para o terminal interativo */
        .terminal-card {
            grid-column: 1 / -1; 
            border: 2px solid #d9534f; 
            background-color: #fffbfa;
        }
    </style>
</head>
<body>
