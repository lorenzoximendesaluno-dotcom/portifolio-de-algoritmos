<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lorenzo Ximendes | Engenharia de Software</title>
    <meta name="description" content="Portfólio de Engenharia de Software: Projetos, Algoritmos e Inovação.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        /* Design Tokens - A base do design profissional */
        :root {
            --bg: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --text-primary: #ededed;
            --text-secondary: #a1a1a1;
            --accent: #3b82f6;
            --border: rgba(255, 255, 255, 0.1);
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            padding: 2rem;
        }

        .container { max-width: 900px; margin: 0 auto; }

        /* Estilo do Header */
        header { padding: 4rem 0; }
        h1 { font-size: clamp(2rem, 5vw, 3rem); margin-bottom: 0.5rem; letter-spacing: -0.05em; }
        p.subtitle { color: var(--text-secondary); font-size: 1.2rem; }

        /* Grid de Projetos Moderno */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 3rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: var(--radius);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.1);
        }

        .card h3 { margin-bottom: 0.5rem; }
        .card p { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 1rem; }

        .btn {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <main class="container">
        <header>
            <h1>Lorenzo Ximendes</h1>
            <p class="subtitle">Engenheiro de Software em formação. Construindo sistemas escaláveis.</p>
        </header>

        <section id="projetos">
            <h2>Projetos Selecionados</h2>
            <div class="projects-grid">
                <article class="card">
                    <h3>Sistema de Monitoramento</h3>
                    <p>Desenvolvimento de arquitetura para monitoramento em tempo real utilizando Python e sensores.</p>
                    <a href="#" class="btn">Ver Código</a>
                </article>
                </div>
        </section>
    </main>

</body>
</html>
